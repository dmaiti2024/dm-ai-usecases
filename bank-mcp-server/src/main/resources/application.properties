spring.application.name=bank-mcp-server
server.port=8092

spring.ai.mcp.server.name=wells-fargo-bank-assistant
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.description=Wells Fargo Bank AI Assistant - query transactions, accounts, customers, and manage disputes

spring.ai.mcp.server.sse-endpoint=/sse
spring.ai.mcp.server.sse-message-endpoint=/mcp/message

bank.api.base-url=http://localhost:9081
bank.api.connect-timeout=5000
bank.api.read-timeout=10000

logging.level.org.springframework.ai.mcp=DEBUG
logging.level.com.bank.mcp=DEBUG
