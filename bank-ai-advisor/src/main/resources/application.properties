spring.application.name=bank-ai-advisor
server.port=8095

spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.1

spring.ai.mcp.client.sse.connections.bank-server.url=http://localhost:8092
spring.ai.mcp.client.sse.connections.bank-server.sse-endpoint=/sse
spring.ai.mcp.client.type=sync
spring.ai.mcp.client.request-timeout=30s
spring.ai.mcp.client.toolcallback.enabled=true

agent.memory.window-size=20

bank.portal.base-url=http://localhost:9081

logging.level.com.bank.advisor=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG
