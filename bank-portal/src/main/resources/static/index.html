<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wells Fargo - Online Banking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="css/bank.css" rel="stylesheet"/>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <div class="wf-logo-text">
        <span class="wf-wells">Wells</span>
        <span class="wf-fargo">Fargo</span>
      </div>
      <div class="wf-stagecoach">&#127946;</div>
    </div>
    <h2 class="login-title">Sign On to Online Banking</h2>
    <div id="loginError" class="alert alert-danger d-none"></div>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control wf-input" placeholder="Enter your username"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control wf-input" placeholder="Enter your password"/>
    </div>
    <button id="loginBtn" class="btn wf-btn-primary w-100">Sign On</button>
    <div class="login-footer">
      <small class="text-muted">Demo credentials: john.smith / password123 &nbsp;|&nbsp; sarah.johnson / password123</small>
    </div>
  </div>
</div>

<!-- MAIN APP (shown after login) -->
<div id="mainApp" class="d-none">

  <!-- HEADER -->
  <header class="wf-header">
    <div class="wf-header-brand">
      <div class="wf-logo-text-sm">
        <span class="wf-wells-sm">Wells</span>
        <span class="wf-fargo-sm">Fargo</span>
      </div>
    </div>
    <div class="wf-header-user">
      <span class="wf-welcome">Welcome, <strong id="displayName">User</strong></span>
      <button id="logoutBtn" class="btn wf-btn-outline-sm">
        <i class="fas fa-sign-out-alt me-1"></i>Sign Off
      </button>
    </div>
  </header>

  <!-- NAVBAR -->
  <nav class="wf-navbar">
    <a class="wf-nav-link active" data-route="dashboard">
      <i class="fas fa-th-large me-1"></i>Dashboard
    </a>
    <a class="wf-nav-link" data-route="transactions">
      <i class="fas fa-exchange-alt me-1"></i>Transactions
    </a>
    <a class="wf-nav-link" data-route="categorize">
      <i class="fas fa-tags me-1"></i>Categorize Spending
    </a>
    <a class="wf-nav-link" data-route="disputes">
      <i class="fas fa-flag me-1"></i>Disputes
    </a>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="wf-main">
    <div id="pageContent" class="page-content">
      <div class="text-center py-5">
        <div class="spinner-border text-danger" role="status"></div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="wf-footer">
    <div class="wf-footer-inner">
      <span>© 2026 Wells Fargo Bank, N.A. All rights reserved.</span>
      <span class="ms-3">Member FDIC &nbsp;|&nbsp; Equal Housing Lender</span>
    </div>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/transactions.js"></script>
<script src="js/pages/categorize.js"></script>
<script src="js/pages/disputes.js"></script>
<script src="js/app.js"></script>
</body>
</html>
